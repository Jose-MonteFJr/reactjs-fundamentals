<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentals</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      // Event sem parâmetro
      const Alert1 = () => {
        const handleAlertClick = () => {
          alert(`Mensagem de alerta!`);
        };

        return (
          <button type="button" onClick={handleAlertClick}>
            Mostrar alerta
          </button>
        );
      };

      // Event com parâmetro
      const Alert2 = () => {
        const handleAlertClick = (msg) => {
          alert(msg);
        };

        return (
          <button
            type="button"
            onClick={() => handleAlertClick(`Você foi alertado!`)} // função anonima
          >
            Mostrar alerta c/ parâmetro
          </button>
        );
      };

      // Event com input
      const Alert3 = () => {
        const handleAlertClick = (event) => {
          alert(event.target.previousSibling.value);
        };

        const handleInputChange = (event) => {
          console.log(event.target.value);
        };

        return (
          <div>
            <input
              type="text"
              placholder="digite algo..."
              onChange={handleInputChange}
            />
            <button onClick={handleAlertClick}>Mostrar alerta c/ input</button>
          </div>
        );
      };

      const App = () => {
        return (
          <main className="p-3">
            <Alert1 />
            <Alert2 />
            <Alert3 />
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
