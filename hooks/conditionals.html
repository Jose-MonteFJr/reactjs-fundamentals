<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentals</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const Counter = () => {
        const [counter, setCounter] = React.useState(0);

        if (counter > 20) {
          return (
            <p> é maior que 20 e parou de renderizar tudo após essa linha</p>
          );
        }

        return (
          <>
            <p>Contador: {counter}</p>

            <p>{counter > 10 ? "Maior que 10" : "Menor ou igual a 10"}</p>

            {counter > 15 && <p>Agora é maior que 15</p>}

            <button onClick={() => setCounter(10)}>Atualizar</button>

            <button onClick={() => setCounter((prevValue) => prevValue + 1)}>
              Incrementar
            </button>

            <button onClick={() => setCounter((prevValue) => prevValue - 1)}>
              Decrementar
            </button>
          </>
        );
      };

      const App = () => {
        return (
          <main className="p-3">
            <Counter />
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
