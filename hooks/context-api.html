<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentals</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      // Criar o contexto
      const CounterContext = React.createContext();

      // Criar o provider
      const CounterProvider = ({ children }) => {
        const [savedCounts, setSavedCounts] = React.useState([]);

        const saveCount = (count) => {
          setSavedCounts((prev) => [...prev, count]);
        };

        return (
          <CounterContext.Provider value={{ savedCounts, saveCount }}>
            {children}
          </CounterContext.Provider>
        );
      };

      const Counter = () => {
        const [counter, setCounter] = React.useState(0);

        const { saveCount } = React.useContext(CounterContext);

        return (
          <>
            <p>Contador: {counter}</p>
            <button onClick={() => setCounter(10)}>Atualizar</button>

            <button onClick={() => setCounter((prevValue) => prevValue + 1)}>
              Incrementar
            </button>

            <button onClick={() => setCounter((prevValue) => prevValue - 1)}>
              Decrementar
            </button>

            <button onClick={() => saveCount(counter)}>Salvar</button>
          </>
        );
      };

      const CounterList = () => {
        const { savedCounts } = React.useContext(CounterContext);

        return (
          <div>
            <h2>Valores salvos:</h2>
            <ul>
              {savedCounts.map((value, index) => (
                <li key={`item-${index}`}>{value}</li>
              ))}
            </ul>
          </div>
        );
      };

      const App = () => {
        return (
          <main className="p-3">
            <CounterProvider>
              <Counter />
              <hr />
              <CounterList />
            </CounterProvider>
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
