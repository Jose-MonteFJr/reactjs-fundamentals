<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentals</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const Counter = () => {
        const [counter, setCounter] = React.useState(0);
        const [name, setName] = React.useState("");

        React.useEffect(() => {
          console.log("Componente montado");

          return () => {
            console.log("Componente desmontado");
          };
        }, []);

        React.useEffect(() => {
          if (counter > 0) {
            console.log(`Contador atualizado: ${counter}`);
          }
        }, [counter]);

        React.useEffect(() => {
          console.log(`Seu nome é: ${name} e o contador é: ${counter}`);
        }, [counter, name]);

        return (
          <>
            <div>
              <label>Nome: </label>
              <input type="text" onChange={(e) => setName(e.target.value)} />
            </div>

            <p>Contador: {counter}</p>
            <button onClick={() => setCounter(10)}>Atualizar</button>

            <button onClick={() => setCounter((prevValue) => prevValue + 1)}>
              Incrementar
            </button>

            <button onClick={() => setCounter((prevValue) => prevValue - 1)}>
              Decrementar
            </button>
          </>
        );
      };

      const App = () => {
        const [show, setShow] = React.useState(true);

        return (
          <main className="p-3">
            <button onClick={() => setShow(!show)}>
              Mostrar/ocultar contador{" "}
            </button>
            <hr />
            {show && <Counter />}
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
